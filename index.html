<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Manager</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/all.min.css" />
    <script src="node_modules/wavesurfer.js/dist/wavesurfer.min.js"></script>
    <style>
      .github-btn {
        color: #ccc;
        font-size: 20px;
        transition: color 0.2s;
        text-decoration: none;
        cursor: pointer;
      }
      .github-btn:hover {
        color: #fff;
      }
      .version-tag {
        font-size: 0.6em;
        color: #949494;
        margin-left: 6px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="top-nav">
      <header class="header">
        <div class="header-left">
          <h2>Sound Manager <span class="version-tag">v0.1a</span></h2>
        </div>
        <div style="flex-grow: 1; display: flex; justify-content: center">
          <div
            id="github-btn"
            class="github-btn"
            title="Visit GitHub Repository"
          >
            <i class="fab fa-github"></i>
          </div>
        </div>
        <div class="header-right">
          <button
            id="btn-sync-usages"
            class="icon-btn"
            title="Sync Audio Usages from Active Sequences"
          >
            <i class="fas fa-sync-alt"></i>
          </button>
          <select
            id="track-val"
            class="small-input"
            title="Target Audio Track"
          ></select>
          <button id="settings-btn" class="icon-btn" title="Settings">
            <i class="fas fa-bars"></i>
          </button>
        </div>
      </header>

      <div class="search-container">
        <input
          type="text"
          id="search-input"
          placeholder='Search... e.g., wind, tag:"sun, rain"'
        />

        <div
          class="search-help"
          title='SEARCH GUIDE:&#10;• Normal text: Searches filename&#10;• tag:"abc" -> File MUST have tag "abc"&#10;• exp:"xyz" -> File MUST NOT have "xyz" in name or tag&#10;• only:"wind" -> Filename (or tag) MUST exactly be "wind"'
        >
          <i class="fas fa-question-circle"></i>
        </div>

        <select id="filter-sort" title="Filter & Sort">
          <option value="all">All</option>
          <option value="fav">⭐ Fav</option>
          <option value="az">A-Z</option>
          <option value="za">Z-A</option>
          <option value="uses">Most Used</option>
        </select>
      </div>
    </div>

    <div class="sfx-list" id="sfx-list"></div>

    <button id="btn-scroll-top" title="Scroll to Top">
      <i class="fas fa-arrow-up"></i>
    </button>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Settings</h3>
          <button id="close-settings"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label>Sound Directories (Paths):</label>
            <div id="folder-list"></div>
            <button id="btn-add-folder" class="btn-secondary">
              <i class="fas fa-plus"></i> Add Directory
            </button>
          </div>
          <div class="setting-group">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
              "
            >
              <input type="checkbox" id="check-show-all-files" /> Load All Files
            </label>
          </div>
          <div class="setting-group">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
              "
            >
              <input type="checkbox" id="check-show-tags" checked /> Display
              Tags
            </label>
          </div>
          <div class="setting-group">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
              "
            >
              <input type="checkbox" id="check-show-seq" checked /> Display
              Active Sequence Usages
            </label>
          </div>
          <div class="setting-group">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
              "
            >
              <input type="checkbox" id="check-show-seq-time" checked /> Display
              Timestamps
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button id="btn-clear-all" class="btn-danger">Clear Memory</button>
          <div style="display: flex; gap: 10px">
            <button
              id="btn-refresh"
              class="btn-secondary"
              style="margin-top: 0"
            >
              <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button id="btn-save-settings" class="btn-primary">
              Save Settings
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
